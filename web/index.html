<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="LetsYak - Secure team communication on Matrix.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LetsYak">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>LetsYak</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="splash/style.css">
  <script src="Imaging.js"></script>

  <!-- Firebase JS SDK — used for web push notifications.
       Initialises the app and exposes two functions called from Dart (web_push_js.dart):
         window._letsyak_requestNotificationPermission()
         window._letsyak_getWebFcmToken(vapidKey)
  -->
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>
  <script>
    (function () {
      const app = firebase.initializeApp({
        apiKey: 'AIzaSyB6r5g7uLroBO7pLLbiI1o8tKPlozNQ_yQ',
        authDomain: 'let-s-yak.firebaseapp.com',
        projectId: 'let-s-yak',
        storageBucket: 'let-s-yak.firebasestorage.app',
        messagingSenderId: '18561045434',
        appId: '1:18561045434:web:118c3da131ac889d1cc383',
      });
      const messaging = firebase.messaging(app);

      window._letsyak_requestNotificationPermission = async function () {
        console.log('[Push] Requesting notification permission...');
        const result = await Notification.requestPermission();
        console.log('[Push] Permission result:', result);
        return result;
      };
      window._letsyak_getWebFcmToken = async function (vapidKey) {
        console.log('[Push] Registering Firebase service worker...');
        const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        console.log('[Push] Service worker registered, scope:', registration.scope);
        console.log('[Push] Requesting FCM token...');
        const token = await messaging.getToken({ vapidKey: vapidKey, serviceWorkerRegistration: registration });
        console.log('[Push] FCM token received:', token ? token.substring(0, 15) + '...' : 'null');
        return token;
      };
    })();
  </script>

  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>

<body>
  <script>
    window.addEventListener('load', function (ev) {
      {{flutter_js}}
      {{flutter_build_config}}

      _flutter.loader.load({
        serviceWorker: {
          serviceWorkerVersion: {{flutter_service_worker_version}},
        },
      onEntrypointLoaded: function (engineInitializer) {
        engineInitializer.initializeEngine({ useColorEmoji: true }).then(function (appRunner) {
          appRunner.runApp();
        });
      }
      });
    });
  </script>
  <picture id="splash">
    <source
      srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x"
      media="(prefers-color-scheme: light) or (prefers-color-scheme: no-preference)">
    <source
      srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x"
      media="(prefers-color-scheme: dark)">
    <img class="center" src="splash/img/light-1x.png" />
  </picture>
</body>

</html>
