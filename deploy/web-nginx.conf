server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Required for SharedArrayBuffer (vodozemac / flutter_rust_bridge)
    add_header Cross-Origin-Opener-Policy   "same-origin"       always;
    add_header Cross-Origin-Embedder-Policy "require-corp"      always;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                always;
    add_header X-Frame-Options         "SAMEORIGIN"             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add COOP/COEP since add_header in a nested block
        # replaces parent-level headers in nginx
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}
